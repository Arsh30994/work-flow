      {

          { name: "Slack Notification", status: "Failed", duration: "0.00s", message: "API Error: 401 Unauthorized token" }
        ]
      }
    ];

    const TEMPLATES = [
      {
        id: "tpl-1",
        name: "Social Media Assistant",
        icon: "share",
        description: "Draft captions, schedule posts, and track engagement across all platforms.",
        nodes: [
          { id: "t-1", type: "Trigger", title: "New Calendar Event", icon: "calendar_month", details: "Sync: Marketing Scheduler", accent: "sage-muted" },
          { id: "t-2", type: "AI Agent", title: "Draft Post Caption", icon: "neurology", details: "Model: Gemini Flash", accent: "primary" },
          { id: "t-3", type: "Action", title: "Post on Social Channels", icon: "share", details: "Platforms: Twitter, LinkedIn", accent: "secondary-container" }
        ]
      },
      {
        id: "tpl-2",
        name: "Smart Invoice Handler",
        icon: "receipt_long",
        description: "Automatically extract data from PDF invoices and sync with accounting records.",
        nodes: [
          { id: "i-1", type: "Trigger", title: "New File in Folder", icon: "folder", details: "Directory: /invoices/pending", accent: "sage-muted" },
          { id: "i-2", type: "AI Agent", title: "Extract Invoice Metadata", icon: "auto_fix_high", details: "Extract: Total, Date, Vendor", accent: "primary" },
          { id: "i-3", type: "Database", title: "Save to Accounting Records", icon: "storage", details: "SQLite Table: Invoices", accent: "tertiary" }
        ]
      },
      {
        id: "tpl-3",
        name: "Email Summarizer",
        icon: "mark_email_unread",
        description: "Get a daily email summary digest filtered by urgent keywords.",
        nodes: [
          { id: "s-1", type: "Trigger", title: "New Email Arrives", icon: "mail", details: "Folder: Inbox, Keywords: support, urgent", accent: "sage-muted" },
          { id: "s-2", type: "AI Agent", title: "Summarize Content", icon: "neurology", details: "Summarize in 2 sentences", accent: "primary" },
          { id: "s-3", type: "Action", title: "Slack Notification", icon: "forum", details: "Channel: #urgent-support", accent: "secondary-container" }
        ]
      },
      {
        id: "tpl-4",
        name: "Meeting Notes Pro",
        icon: "description",
        description: "Transcribe meetings, extract tasks, and write recaps to a Notion page.",
        nodes: [
          { id: "m-1", type: "Trigger", title: "Recording Added", icon: "mic", details: "Folder: Google Drive/Recordings", accent: "sage-muted" },
          { id: "m-2", type: "AI Agent", title: "Generate Recap & Tasks", icon: "neurology", details: "Model: Gemini Pro", accent: "primary" },
          { id: "m-3", type: "Action", title: "Create Notion Page", icon: "notes", details: "Database: Meeting Recaps", accent: "secondary-container" }
        ]
      }
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [workflows, setWorkflows] = useState(() => {
        const saved = localStorage.getItem('flowguide_workflows');
        return saved ? JSON.parse(saved) : INITIAL_WORKFLOWS;
      });
      const [connections, setConnections] = useState(() => {
        const saved = localStorage.getItem('flowguide_connections');
        return saved ? JSON.parse(saved) : INITIAL_CONNECTIONS;
      });
      const [history, setHistory] = useState(() => {
        const saved = localStorage.getItem('flowguide_history');
        return saved ? JSON.parse(saved) : INITIAL_LOGS;
      });
      const [settings, setSettings] = useState(() => {
        const saved = localStorage.getItem('flowguide_settings');
        return saved ? JSON.parse(saved) : {
          name: 'Alex Rivers',
          email: 'alex.rivers@flowguide.com',
          timezone: 'EST (GMT-5)',
          notifications: { runs: true, errors: true, updates: false, security: true },
          avatar: ''
        };
      });

      const [theme, setTheme] = useState('dark');
      const [builderNodes, setBuilderNodes] = useState([]);
      const [builderWorkflowId, setBuilderWorkflowId] = useState(null);
      const [builderWorkflowName, setBuilderWorkflowName] = useState('New Custom Workflow');
      const [selectedNode, setSelectedNode] = useState(null);
      const [guideOpen, setGuideOpen] = useState(true);
      const [chatMessages, setChatMessages] = useState([
        { sender: 'guide', message: 'Hi Alex! I see you\'re back. Would you like to check the performance of your support workflows, or start something new?', time: '2m ago' }
      ]);
      const [chatInput, setChatInput] = useState('');
      const [showConnectModal, setShowConnectModal] = useState(null);
      const [apiKeyInput, setApiKeyInput] = useState('');
      const [isConnecting, setIsConnecting] = useState(false);
      const [toast, setToast] = useState({ show: false, message: '', icon: 'check_circle' });
      const [searchQuery, setSearchQuery] = useState('');

      // Save states to LocalStorage automatically
      useEffect(() => {
        localStorage.setItem('flowguide_workflows', JSON.stringify(workflows));
      }, [workflows]);
      useEffect(() => {
        localStorage.setItem('flowguide_connections', JSON.stringify(connections));
      }, [connections]);
      useEffect(() => {
        localStorage.setItem('flowguide_history', JSON.stringify(history));
      }, [history]);
      useEffect(() => {
        localStorage.setItem('flowguide_settings', JSON.stringify(settings));
      }, [settings]);

      // Theme toggle effect
      useEffect(() => {
        const root = document.documentElement;
        const body = document.body;
        if (theme === 'dark') {
          root.classList.add('dark');
          body.classList.add('dark');
        } else {
          root.classList.remove('dark');
          body.classList.remove('dark');
        }
      }, [theme]);

      const showToast = (message, icon = 'check_circle') => {
        setToast({ show: true, message, icon });
        setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3000);
      };

      // --- SAVE & RUN LOGIC ---
      const handleSaveWorkflow = () => {
        if (!builderWorkflowName.trim()) {
          showToast('Workflow name cannot be empty', 'error');
          return;
        }
        
        const now = new Date().toISOString();
        if (builderWorkflowId) {
          setWorkflows(prev => prev.map(w => {
            if (w.id === builderWorkflowId) {
              return { ...w, name: builderWorkflowName, nodes: builderNodes, updated_at: now };
            }
            return w;
          }));
          showToast('Workflow updated successfully', 'cloud_done');
        } else {
          const newId = Date.now();
          const newWf = {
            id: newId,
            name: builderWorkflowName,
            status: 'Paused',
            nodes: builderNodes,
            updated_at: now
          };
          setWorkflows(prev => [...prev, newWf]);
          setBuilderWorkflowId(newId);
          showToast('Workflow saved successfully', 'cloud_done');
        }
      };

      const handleRunWorkflow = (id) => {
        const targetId = id || builderWorkflowId;
        const wf = workflows.find(w => w.id === targetId) || { name: builderWorkflowName, nodes: builderNodes };
        
        if (!wf.nodes || wf.nodes.length === 0) {
          showToast('Cannot run an empty workflow canvas', 'warning');
          return;
        }

        showToast('Executing workflow pipeline...', 'rocket_launch');

        // Simulate execution latency
        setTimeout(() => {
          const isSuccess = Math.random() > 0.08;
          const latency = (Math.random() * 0.8 + 0.2).toFixed(2) + "s";
          const failIdx = isSuccess ? -1 : Math.floor(Math.random() * wf.nodes.length);
          
          const stepsLog = wf.nodes.map((node, i) => {
            const stepDuration = (Math.random() * 0.2 + 0.05).toFixed(2) + "s";
            if (i === failIdx) {
              return {
                name: node.title,
                status: "Failed",
                duration: stepDuration,
                message: `Execution failed: API returned error 400 Bad Request at step ${node.title}.`
              };
            }
            return {
              name: node.title,
              status: "Success",
              duration: stepDuration,
              message: "Processed successfully: Input mapped and forwarded."
            };
          });

          const prunedSteps = isSuccess ? stepsLog : stepsLog.slice(0, failIdx + 1);

          const newLog = {
            id: Date.now(),
            workflow_name: wf.name,
            status: isSuccess ? "Success" : "Failed",
            speed: latency,
            timestamp: new Date().toISOString(),
            steps: prunedSteps
          };

          setHistory(prev => [newLog, ...prev]);
          showToast(isSuccess ? 'Run completed successfully!' : 'Run failed at some steps', isSuccess ? 'check_circle' : 'error');
        }, 1200);
      };

      const handleToggleWorkflow = (wf) => {
        const newStatus = wf.status === 'Active' ? 'Paused' : 'Active';
        setWorkflows(prev => prev.map(w => {
          if (w.id === wf.id) {
            return { ...w, status: newStatus };
          }
          return w;
        }));
        showToast(`Workflow ${newStatus === 'Active' ? 'Activated' : 'Paused'}`, newStatus === 'Active' ? 'play_arrow' : 'pause');
      };

      const handleDeleteWorkflow = (id) => {
        if (!confirm('Are you sure you want to delete this workflow?')) return;
        setWorkflows(prev => prev.filter(w => w.id !== id));
        if (builderWorkflowId === id) {
          setBuilderWorkflowId(null);
          setBuilderWorkflowName('New Custom Workflow');
          setBuilderNodes([]);
        }
        showToast('Workflow deleted successfully', 'delete');
      };

      const handleToggleConnection = (connId) => {
        setConnections(prev => prev.map(c => {
          if (c.id === connId) {
            const nextStatus = c.status === 'Connected' ? 'Disconnected' : 'Connected';
            return { ...c, status: nextStatus, last_synced: nextStatus === 'Connected' ? 'Just now' : null };
          }
          return c;
        }));
        showToast('Connection toggled', 'swap_horiz');
      };

      const handleReconnectConnection = () => {
        if (!showConnectModal) return;
        setIsConnecting(true);
        setTimeout(() => {
          setConnections(prev => prev.map(c => {
            if (c.id === showConnectModal.id) {
              return { ...c, status: 'Connected', last_synced: 'Just now' };
            }
            return c;
          }));
          showToast(`Reconnected to ${showConnectModal.name}!`, 'verified');
          setShowConnectModal(null);
          setApiKeyInput('');
          setIsConnecting(false);
        }, 1000);
      };

      const handleUseTemplate = (tpl) => {
        const newWf = {
          id: Date.now(),
          name: tpl.name,
          status: 'Paused',
          nodes: tpl.nodes,
          updated_at: new Date().toISOString()
        };
        setWorkflows(prev => [...prev, newWf]);
        setBuilderWorkflowId(newWf.id);
        setBuilderWorkflowName(newWf.name);
        setBuilderNodes(tpl.nodes);
        setActiveTab('builder');
        showToast(`Loaded ${tpl.name} template!`, 'auto_awesome');
      };

      // --- CANVAS NODE OPERATIONS ---
      const addNodeToCanvas = (type) => {
        let title = type;
        let icon = 'extension';
        let accent = 'primary';
        let details = 'Click to configure details';

        if (type === 'Slack Notification') {
          title = 'Slack Notification';
          icon = 'forum';
          accent = 'secondary-container';
          details = 'Channel: #general, Message: "Alert"';
        } else if (type === 'Database') {
          title = 'Save to Database';
          icon = 'storage';
          accent = 'tertiary';
          details = 'Table: support_tickets';
        } else if (type === 'AI Agent') {
          title = 'Gemini Data Classifier';
          icon = 'neurology';
          accent = 'primary';
          details = 'Model: Gemini Pro';
        } else if (type === 'Webhook') {
          title = 'Webhook Listener';
          icon = 'webhook';
          accent = 'sage-muted';
          details = 'URL: /webhook/sync';
        } else if (type === 'Trigger') {
          title = 'New Email Trigger';
          icon = 'mail';
          accent = 'sage-muted';
          details = 'Account: personal@email.com';
        } else if (type === 'Condition') {
          title = 'Conditional Filter';
          icon = 'call_split';
          accent = 'tertiary';
          details = 'Check values exist';
        }

        const newNode = {
          id: `node-${Date.now()}-${Math.random().toString(36).substr(2, 4)}`,
          type,
          title,
          icon,
          details,
          accent
        };
        setBuilderNodes(prev => [...prev, newNode]);
        showToast(`Added ${title} step`, 'add_circle');
      };

      const removeNodeFromCanvas = (nodeId) => {
        setBuilderNodes(prev => prev.filter(n => n.id !== nodeId));
        if (selectedNode && selectedNode.id === nodeId) {
          setSelectedNode(null);
        }
        showToast('Removed step', 'remove_circle');

                    <span className="material-symbols-outlined text-[28px]" style={{ color: showConnectModal.color }}>{showConnectModal.icon}</span>
                    <h3 className="font-headline font-bold text-lg text-on-surface">Manage {showConnectModal.name}</h3>
                  </div>
                  <button onClick={() => setShowConnectModal(null)} className="material-symbols-outlined text-outline hover:text-primary">close</button>
                </div>

                <div className="space-y-4">
                  <p className="text-xs text-on-surface-variant leading-relaxed">
                    Connect FlowGuide with your {showConnectModal.name} credentials. Enter your integration API token key below:
                  </p>
                  <div className="space-y-2">
                    <label className="text-[10px] font-extrabold uppercase text-on-surface-variant block">API KEY TOKEN</label>
                    <input
                      type="password"
                      placeholder="Paste key token (e.g. xoxb-...)"
                      className="w-full p-3 bg-surface-container border border-node-border/30 rounded-xl focus:ring-1 focus:ring-primary text-xs font-mono text-on-surface"
                      value={apiKeyInput}
                      onChange={e => setApiKeyInput(e.target.value)}
                    />
                  </div>
                </div>

                <div className="flex gap-3 justify-end pt-4 border-t border-node-border/40">
                  <button onClick={() => setShowConnectModal(null)} className="px-4 py-2 hover:bg-surface-container-high text-on-surface-variant text-xs font-bold rounded-xl">Cancel</button>
                  <button
                    onClick={handleReconnectConnection}
                    disabled={isConnecting}
                    className="px-5 py-2.5 bg-primary text-on-primary text-xs font-bold rounded-xl flex items-center gap-2 hover:brightness-110 active:scale-95 shadow-sm disabled:opacity-50"
                  >
                    {isConnecting ? 'Authenticating...' : 'Save & Connect'}
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
